<!-- 
- `<video>` : `<video src="" controls autoplay> 여긴 비디오요소 지원하지않을때 노출 </video>`
    - 속성
        - src
        - controls : 속성 존재 시 소리조절, 탐색, 일시정지, 재시작 가능
        - autoplay : 속성 존재 시 자동재생
-->
