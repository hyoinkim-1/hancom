<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>
        영상 넣기
    </title>
</head>
<body>
    <h1>영상 가져오기</h1>
    <iframe width="200" height="400" 
        src="https://www.youtube.com/embed/dPEpoyWVbIc" 
        title="고양이가 불렀을 때 대답 안해주면" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen>
    </iframe>
    <!-- 유투브 소스코드 복사시 iframe 코드 그대로 줌 -->
</body>
</html>

<!-- <iframe> : inline browsing context. 다른 html 페이지를 페이지에 임베딩할 때 사용.  -->
