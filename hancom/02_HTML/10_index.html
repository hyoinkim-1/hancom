<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시맨틱 태그</title>
</head>
<body>
    <header>맨위 제목 로고</header>
    <main> <!--내용-->
        <ul> <!-- unordered list , 하위 <li> 요소들이 점으로 나열됨 -->
            <li>좋 : </li>
            <li>취 : </li>
            <li>목 : </li>
        </ul>
    </main>
    <footer>맨 아래 (저작권 연락처 등등)</footer>
</body>
</html>

<!-- 
블록 요소 : 한줄 전부 차지 <p> <h1> <ul> <ol> <header> ...
인라인 요소 : 글자처럼 자리배치 <a> <strong> <em> <span> ... 
-->

<!-- 
단순 div가 아닌 의미를 담고있는 태그 - 시맨틱 태그 사용하는게 좀더 코드가독성이나 SEO에 도움이 됨
header / main / footer 
nav / section / article / aside

기본적인 웹사이트의 레이아웃을 의미별로 요소를 나눠둔것
-->
