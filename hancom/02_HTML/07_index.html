<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>강조 strong 연습</title>
    </head>
    <body>
        <p>
            ㅎㅎ
            <strong>&lt;ㅎㅎ&gt;</strong>
            ㅎㅎ
            
        </p>
    </body>
</html>
<!-- 
- 중첩된 태그는 스택구조. 선입후출 ( 먼저 연 태그가 나중에 닫혀야함 )

- 엔티티 연습 < > &는 html상의 태그나 명령어로 인식하기 때문에 문자로 쓰기 위해서는 약속된 기호로 작성
    < : &lt; less than
    > : &gt; greater than
    & : &amp; ampersand
    " : &quot; quote
    ' : &apos; apostrophe
     (공백) : &nbsp; non-breaking space
    ... etc
- 브라우저상에서 읽히지만 엔티티로 사용하는것을 권장
-->
