<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글자꾸미기</title>
</head>
<body>
    <p><em>기울임 강조</em></p>
    <p><mark>형광펜</mark></p>
    <p><small>작게 쓰는 글씨</small></p>
    <p><code>print("hi")</code></p>
    <blockquote>인용 덩어리ㄴㅇㄹㄴㄷㄹㄴㅇㄹ</blockquote>
    <p>H<sub>2</sub>O</p> 
    <p>x<sup>2</sup></p>
</body>
</html>



<!--
em : 비스듬하게
mark : 형광펜으로칠
small : 글자 작게
code : 코드블록처럼
blockquote : 인용칸
sub : 아래첨자
sup : 윗첨자
-->
