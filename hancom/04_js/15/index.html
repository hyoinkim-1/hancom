<!-- - Object : key-value 쌍으로 이루어진 객체`{key : value}`

- Class : 객체지향프로그래밍(OOP)의 핵심. 반복 사용되는 객체에 대한 구조(틀)을 미리 정해둘 수 있음
    - new ClassName()으로 새로운 인스턴스를 생성
    - constructor() : 생성자 메서드. 새로운 인스턴스를 생성할 때 이 메서드를 통해 내부속성과 binding
    - `this` 키워드를 통해 인스턴스를 가리킬 수 있음

- OOP 4가지 특징
    - 캡슐화 (Encapsulation) : 관련된 데이터와 메서드를 하나로 묶고 내부 구현을 외부에 숨기는 것 (private public 과 같은 접근 제어자 활용, getter/setter를 통한 간접 접근)
    - 상속 (Inheritance) : 이미 정의된 상위 클래스의 속성과 메서드를 하위 클래스가 물려받는 재사용하는 방식 (학생 → 대학생)
    - 다형성 (Polymorphism) : 같은 이름의 메서드가 객체에 따라 다르게 동작할 수 있게 하는 것. 오버라이딩/오버로딩
        - 오버라이딩 : 상위 클래스로부터 상속받은 메서드를 하위 클래스에서 재정의
        (상속받은 메서드를 재정의)
        - 오버로딩: 메소드 이름이 같고 매개변수의 개수, 타입이 다른것
        (기존에 없는 새로운 메서드 추가(
    - 추상화 (Abstraction) : 현실 세계의 요소를 필요한 핵심 속성과 기능만 추출해 모델링하는 과정( 차 → 속성 : 속도, 크기/ 기능(메서드) : 운전, 정지) -->
