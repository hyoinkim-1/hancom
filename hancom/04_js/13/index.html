<!-- - Array : 배열. Array[1];
    - 속성 : length
    - 메서드
        - push(): 배열 끝에 추가할 요소들. 갱신된 length return
        - pop() : 배열 마지막요소 제거한 후 return
        - shift() : 배열 첫번째요소 제거한 후 return
        - join() : 배열의 모든요소를 seperator로 이어붙인 string return. 
        seperator의 default값은 ,(comma)
        - slice() : begin부터 end까지 얕은복사로 새로운 배열 return
        - fill() : 인덱스의 모든요소를 정적값으로 변경
        - splice(startIdx [, deleteCount[, item1[, item2…]]]) : 기존요소 삭제&추가
        시작인덱스부터 delCount만큼 지운후 items들 추가. return값은 삭제 요소들을 담은 배열
        - sort([compareFunction]) : 정렬
    - filter, every, forEach, reduce, map, find 순회 메서드 -->
