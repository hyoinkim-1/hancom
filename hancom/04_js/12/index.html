<!-- 
- string : https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/String#인스턴스_속성
    - 속성
        - length : string의 길이
    - 메서드
        - toUpperCase()  : 대문자로 변환
        - replace(바꾸려는문자, 바뀌는문자) : 문자 변환(첫 번째로 찾은 패턴만）
        - replaceAll() : 모든 해당 패턴에 대해 적용
        - at(idx), charAt() :
        - concat(str) : string들을 이어붙여 새로운 string return
        - slice(beginIndex [, endIndex])
        - split([sep [, limit]]) : sep 의 default 값은 “ “. split 된 문자열들의 Array를 return -->
