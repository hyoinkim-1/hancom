<!-- 
- localStorage : 로컬스토리지. `f12` 의 Application 탭에서 확인 가능. 페이지 프로토콜 별로 구분
    - cf ) 쿠키, 세션
    - `.getItem("key")` : key에 해당하는 value return
    - `.setItem("key", value)`  : key값에 value 저장
    - `.removeItem("key")` : 해당하는 key를 제거
    - `.clear()` : 모든 키 제거 -->
