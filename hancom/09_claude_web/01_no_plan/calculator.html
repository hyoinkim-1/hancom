<!doctype html>
<meta charset="utf-8">
<title>계산기</title>
<style>
  body { font-family: system-ui, sans-serif; display: grid; place-items: center; height: 100vh; margin: 0; background: #222; }
  #calc { width: 240px; }
  #screen { width: 100%; height: 56px; font-size: 28px; text-align: right; box-sizing: border-box; padding: 0 12px; border: none; border-radius: 8px; margin-bottom: 8px; background: #111; color: #fff; }
  #keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  button { height: 56px; font-size: 20px; border: none; border-radius: 8px; background: #444; color: #fff; cursor: pointer; }
  button:hover { background: #555; }
  button.op { background: #f90; }
  button.eq { background: #2a7; grid-column: span 2; }
</style>
<div id="calc">
  <input id="screen" value="0" disabled>
  <div id="keys"></div>
</div>
<script>
  const screen = document.getElementById('screen');
  const keys = [
    '7','8','9','/',
    '4','5','6','*',
    '1','2','3','-',
    '0','.','C','+',
  ];
  let expr = '';
  function render() { screen.value = expr || '0'; }
  keys.forEach(k => {
    const b = document.createElement('button');
    b.textContent = k;
    if ('/*-+'.includes(k)) b.className = 'op';
    b.onclick = () => {
      if (k === 'C') expr = '';
      else expr += k;
      render();
    };
    document.getElementById('keys').append(b);
  });
  const eq = document.createElement('button');
  eq.textContent = '='; eq.className = 'eq';
  eq.onclick = () => {
    try { expr = String(evalExpr(expr)); }
    catch { expr = 'Error'; }
    render();
  };
  document.getElementById('keys').append(eq);
  // 안전 계산: eval 대신 숫자/연산자만 허용
  function evalExpr(s) {
    if (!/^[\d.+\-*/() ]+$/.test(s)) throw 'bad';
    return Function('"use strict";return (' + s + ')')();
  }
  render();
</script>
