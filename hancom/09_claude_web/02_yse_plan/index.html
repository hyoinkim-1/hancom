<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>계산기</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: #1113; font-family: system-ui, sans-serif;
  }
  .calc {
    width: min(92vw, 320px); background: #222; border-radius: 16px;
    padding: 16px; box-shadow: 0 10px 40px #0006;
  }
  .screen {
    background: #111; color: #fff; border-radius: 10px; padding: 16px;
    text-align: right; font-size: 2rem; min-height: 2.5rem;
    word-break: break-all; overflow-wrap: anywhere;
  }
  .grid {
    margin-top: 12px; display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  button {
    border: 0; border-radius: 10px; padding: 16px 0; font-size: 1.2rem;
    background: #444; color: #fff; cursor: pointer;
  }
  button:active { filter: brightness(1.3); }
  .op { background: #f90; }
  .eq { background: #2a7; }
  .fn { background: #666; }
  .span2 { grid-column: span 2; }
</style>

<div class="calc">
  <div class="screen" id="screen">0</div>
  <div class="grid">
    <button class="fn" data-k="C">C</button>
    <button class="fn" data-k="back">←</button>
    <button class="op" data-k="/">÷</button>
    <button class="op" data-k="*">×</button>

    <button data-k="7">7</button>
    <button data-k="8">8</button>
    <button data-k="9">9</button>
    <button class="op" data-k="-">−</button>

    <button data-k="4">4</button>
    <button data-k="5">5</button>
    <button data-k="6">6</button>
    <button class="op" data-k="+">+</button>

    <button data-k="1">1</button>
    <button data-k="2">2</button>
    <button data-k="3">3</button>
    <button class="eq" data-k="=" style="grid-row: span 2;">=</button>

    <button class="span2" data-k="0">0</button>
    <button data-k=".">.</button>
  </div>
</div>

<script>
let expr = "";
const screen = document.getElementById("screen");
const render = () => screen.textContent = expr || "0";

// 숫자/소수점/연산자만 허용하는 셔팅야드 계산 (eval 미사용)
function calc(s) {
  const toks = s.match(/\d+\.?\d*|[+\-*/]/g);
  if (!toks) return null;
  const prec = { "+": 1, "-": 1, "*": 2, "/": 2 };
  const out = [], ops = [];
  for (const t of toks) {
    if (t in prec) {
      while (ops.length && prec[ops.at(-1)] >= prec[t]) out.push(ops.pop());
      ops.push(t);
    } else out.push(parseFloat(t));
  }
  while (ops.length) out.push(ops.pop());
  const st = [];
  for (const t of out) {
    if (typeof t === "number") { st.push(t); continue; }
    const b = st.pop(), a = st.pop();
    if (a === undefined || b === undefined) return null;
    if (t === "/" && b === 0) throw new Error("div0");
    st.push(t === "+" ? a + b : t === "-" ? a - b : t === "*" ? a * b : a / b);
  }
  return st.length === 1 ? st[0] : null;
}

function press(k) {
  if (k === "C") expr = "";
  else if (k === "back") expr = expr.slice(0, -1);
  else if (k === "=") {
    try {
      const r = calc(expr);
      expr = r === null ? expr : String(+r.toFixed(10));
    } catch { expr = "Error"; }
  } else {
    if (expr === "Error") expr = "";
    // 연산자 중복 방지
    if ("+-*/".includes(k) && "+-*/".includes(expr.at(-1) ?? "")) expr = expr.slice(0, -1);
    expr += k;
  }
  render();
}

document.querySelectorAll("button").forEach(b =>
  b.addEventListener("click", () => press(b.dataset.k)));

addEventListener("keydown", e => {
  const map = { Enter: "=", "=": "=", Backspace: "back", Escape: "C" };
  if (e.key in map) { e.preventDefault(); press(map[e.key]); }
  else if (/[0-9.+\-*/]/.test(e.key)) press(e.key);
});

render();
</script>
