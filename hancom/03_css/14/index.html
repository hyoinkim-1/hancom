<!-- - at-rules `@identifier(RULE)` : 식별자와 rule을 포함한 css문 `https://developer.mozilla.org/ko/docs/Web/CSS/Guides/Syntax/At-rules`
    - @charset, @import, @namespace, @media, 등등 포함
    - `@media <media-query-list> {<rule-list>}` : 미디어 쿼리 결과에 따른 CSS 적용 가능 ( 장치의 width나 height에 따른 조건문..)
        - 미디어 쿼리 : [링크](https://developer.mozilla.org/ko/docs/Web/CSS/Guides/Media_queries/Using)
            
            ```css
            @media print and (min-width: 30em) and (max-width: 50em) {
              /* 프린터와 최소너비30em, 최대너비 50em일 경우 적용 */
            }
            ``` -->
