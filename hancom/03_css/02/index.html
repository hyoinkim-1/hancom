<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코드 순서 관례</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <h1>코드 순서 관례</h1>           <!-- h1 → navy 가운데 -->
    <p>일반 요소 — 모든 p</p>          <!-- p → gray -->
    <p class="special">이 줄만 주황</p> <!-- .special → orange -->
    <ul>
        <li>사과</li>
        <li><em>바나나</em>는 보라</li>    <!-- li em → purple -->
    </ul>
</body>
</html>


<!-- body -> element -> class -> child 순으로 구체화되는 순서로 작성 -->
