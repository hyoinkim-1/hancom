<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/main.css">
    <title>css 리셋</title>
</head>
<body>
    <h1>css 리셋</h1>
    <p>main.css 맨위 *{} 3줄 지웠다 썼다해보기</p>
</body>
</html>

<!-- - CSS reset : 브라우저가 기본적으로 padding, margin, box-sizing 등을 설정하기 때문에 기획/설계한 대로 화면이 출력되게 하기 위해서는 css 리셋이 필수적
    
    ```css
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }
    ```
    
    - box-sizing이 content-box로 설정되어 있을 경우 border 너비에 따라 요소의 크기가 달라짐 -->
