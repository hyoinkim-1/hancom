<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 모델 (padding · margin · border)</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <ul>                                   <!-- 이 ul 상자에 padding·border·margin 적용 -->
      <li>여백과 테두리를 가진 상자</li>
    </ul>
  </body>
</html>

<!-- 

- padding * margin * border
    - padding 요소 내부 여백
    - margin 요소 외부 여백
        
        ```css
        margin : 20px; /* 상하좌우 */
        margin : 20px 20px; /* 상하 좌우*/
        margin : 20px 10px 15px 20px /* 상 우 하 좌(시계방향) */
        margin-top;
        margin-right;
        margin-bottom;
        margin-left;
        ```
        
    - border 요소 경계(패딩 마진 중간)
        
        `border : 1px solid black;` line-width | line-style | color -->
