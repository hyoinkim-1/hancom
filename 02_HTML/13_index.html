<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>
        줄바꿈과 가로선
    </title>
</head>
<body>
    <p>
        첫째 줄
        <br> <!-- 줄바꿈요소 br-->
        둘째 줄
    </p>
    <hr align="right" color="000000" size="5px"> <!-- horizontal line 가로선-->
    <p>
        test
    </p>
</body>
</html>

<!-- 
- `<br>` : 줄바꿈(캐리지 리턴) 요소
- `<hr>` : 가로줄(horizontal line) 요소
    - `align` , `color` , `noshade` , `size` , `width` 와 같은 attribute 있음 
    -->
