<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>
        표 만들기
    </title>
</head>
<body>
    <table border="1">
        <tr><th>요일</th><th>과목</th></tr>
        <tr><td>월</td><td>국어</td></tr>
        <tr><td>화</td><td>수학</td></tr>
    </table>
</body>
</html>

<!--
- `<table>`
    - `<tr>` : table row (행)
    - `<th>` : table header (제목)
    - `<td>` : table data cell (표 한칸)

    border,cellpadding, cellspacing, 등의 attribute도 있지만, css로 사용하는 것이 좋다. 
    deprecated 된 속성값
-->
