<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시맨틱 구조</title>
</head>
<body>
    <h1>시맨틱 구조</h1>
    <header>
        <nav>홈 소개 연락처</nav>
    </header>
    <main>
        <section>
            <article>첫 번째 내용</article>
        </section>
    </main>
    <aside>곁다리 정보</aside>
    <footer>
        &copy; 2026 내 사이트
    </footer>
</body>
</html>


<!-- 
    시맨틱 태그를 사용하는 것이 접근성, SEO 측면에서 좋음
    의미없는 div가 아닌 main(본문)과 같은 시맨틱 태그를 사용하면 어떤 부분인지 확실하게 알 수 있기 때문

    - section은 한 주제로 묶인 부분
    - article은 그 자체로 완결된 글(카드, 뉴스, 글 등)
-->
