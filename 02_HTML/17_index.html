<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>
        지도 넣기
    </title>
</head>
<body>
    <h1>SG 타워 위치</h1>
    <iframe 
        src="https://www.google.com/maps/embed?pb=!1m5!3m3!1m2!1s0x357b5809d2beceb3%3A0x78bcb4b614ae7c74!2zU0ftg4Dsm4w!5e0!3m2!1sko!2skr!4v1782785205836!5m2!1sko!2skr" 
        width="600" 
        height="450" 
        style="border:0;" 
        allowfullscreen="true" 
        loading="lazy" 
        referrerpolicy="strict-origin-when-cross-origin"></iframe>

    <!-- * 카카오맵 - 지도퍼가기 -->
    <!-- 1. 지도 노드 -->
    <div id="daumRoughmapContainer1782785749248" class="root_daum_roughmap root_daum_roughmap_landing"></div>

    <!--
        2. 설치 스크립트
        * 지도 퍼가기 서비스를 2개 이상 넣을 경우, 설치 스크립트는 하나만 삽입합니다.
    -->
    <script charset="UTF-8" class="daum_roughmap_loader_script" src="https://ssl.daumcdn.net/dmaps/map_js_init/roughmapLoader.js"></script>

    <!-- 3. 실행 스크립트 -->
    <script charset="UTF-8">
        new daum.roughmap.Lander({
            "timestamp" : "1782785749248",
            "key" : "qztofvs7nm5",
            "mapWidth" : "640",
            "mapHeight" : "360"
        }).render();
    </script>
</body>
</html>

<!-- 구글지도 , 공유 -> 퍼가기하면 iframe 코드 그대로 제공 -->
