<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>입력칸 종류</title>
</head>
<body>
    <h1>입력 type</h1>
    <form action="">
        <label for="email">
            아이디 : 
            <input type="email" placeholder="메일">
        </label><br>
        
        <label for="password">
            패스워드 : 
            <input type="password">
        </label><br>

        <label for="consent">
            <input type="checkbox" checked> 동의
        </label><br>

       
        성별
         <label for="gender">
            <input type="radio" name="gender" value="male">남
        </label>
        <label>
            <input type="radio" name="gender" value="female">여
        </label><br>

        <label for="date">
            <input type="date">
        </label><br>
        
        <textarea name="text" id="">txt</textarea><br>

        <span>지역 선택</span>
        <select name="address" id="address">
            <option value="서울">서울</option>
            <option value="부산" selected>부산</option>
            <option value="대전">대전</option>
        </select><br>

        <button type="submit">제출</button>
    </form>
    
</body>
</html>

<!-- 
input type

text, number, radio, checkbox, date, datetime-local, email, password, file, image, 등등.. 타입 다양
-->
