<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        .note{
            color: rebeccapurple;
            border: 1px solid red;
            padding : 10px;
            margin: 10px;
        }
    </style>
    <title>class 이름표</title>
</head>
<body>
    <p class="note">1번째 줄</p>
    <p class="note">2번째 줄</p>
</body>
</html>

<!--
- class, id
    - `<p class="mainline" id="firstline">`
    - class : 요소를 그룹핑할 수 있음
        - .mainline
    - id : 유일 요소에 대한 네이밍
        - #firstline
    - `document.getElementById` , `document.querySelector` 같은 js element 선택 메서드를 이용해 #id 와 .class를 탐색 가능
-->
