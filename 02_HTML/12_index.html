<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>
        번호 목록
    </title>
</head>
<body>
    <!-- ordered list 1,2,3과 같이 넘버링으로 나열된다. -->
    <ol type="I" start="4"> 
        <li>첫번</li>
        <li>두번</li>
        <li>세번</li>
    </ol>
</body>
</html>

<!-- 
- `type` attribute로 넘버링 말고 다른 나열요소로 바꿀 수 있음
    - `"1"` (default) : 숫자
    - `”i”` : i, ii, iii 와 같은 로마 숫자
    - `"I"` : 대문자 로마 숫자
    - `"a"` : 소문자 알파벳
    - `"A"` : 대문자 알파벳 

- `start` attribute로 시작 숫자를 변경할 수 있다. ex) start="4"
    -->
